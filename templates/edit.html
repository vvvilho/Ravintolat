<!DOCTYPE html>
<html>
<head>
    <title>Muokkaa ravintolaa</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <h1>Muokkaa ravintolaa: {{ restaurant.name }}</h1>
    
    <form action="/restaurants/edit/{{ restaurant.id }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        
        <p>
            <label for="name">Ravintolan nimi:</label><br />
            <input type="text" id="name" name="name" required value="{{ restaurant.name }}">
        </p>
        <p>
            <label for="description">Kuvaus:</label><br />
            <textarea id="description" name="description" rows="5" cols="40">{{ restaurant.description }}</textarea>
        </p>
        <p>
            <label for="city_id">Kaupunki:</label><br />
            <select id="city_id" name="city_id">
                <option value="">-- Valitse --</option>
                {% for c in cities %}
                <option value="{{ c.id }}" {% if c.id == restaurant.city_id %}selected{% endif %}>
                    {{ c.name }}
                </option>
                {% endfor %}
            </select>
        </p>
        <p>
            <label for="address">Osoite:</label><br />
            <input type="text" id="address" name="address" value="{{ restaurant.address }}">
        </p>
        <p>
            <label for="price_level">Hintataso:</label><br />
            <select id="price_level" name="price_level">
                {% for i in range(1, 5) %}
                <option value="{{ i }}" {% if i == restaurant.price_level %}selected{% endif %}>
                    {{ "€" * i }}
                </option>
                {% endfor %}
            </select>
        </p>
        <fieldset>
            <legend>Kategoriat</legend>
            {% for cat in categories %}
            <label>
                <input type="checkbox" name="categories" value="{{ cat.id }}"
                {% if cat.id in current_cat_ids %}checked{% endif %}>
                {{ cat.name }}    
            </label><br>
            {% endfor %}
        </fieldset>
        <br>
        <button type="submit">Tallenna muutokset</button>
        <a href="/">Peruuta</a>
    </form>
<hr>
<div style="background-color: #fff0f0; padding: 15px; border: 1px solid #ffcccc;">
    <h3>Poista ravintola</h3>
    <p>Haluatko varmasti poistaa tämän ravintolan? Toimintoa ei voi peruuttaa.</p>
    
    <form action="/restaurants/delete/{{ restaurant.id }}" method="post" 
          onsubmit="return confirm('Haluatko varmasti poistaa ravintolan? Kaikki kommentit ja tiedot poistuvat.');">
          <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
          <button type="submit">
            Poista ravintola lopullisesti
          </button>
    </form>
</div>
</body>
</html>
